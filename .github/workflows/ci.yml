name: CI

on:
  push:
    branches: ["main", "development", "project/123140043-119140157-StudyMate", "sprint_2"]
  pull_request:
    branches: ["main", "development", "project/123140043-119140157-StudyMate", "sprint_2"]

jobs:
  build-and-test:
    name: Build & Test (Android)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.4.1

      # 4. Create local.properties untuk API Key Gemini
      - name: Create local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > local.properties

      # 5. Grant execute permission for gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Run unit tests
      - name: Run unit tests
        run: gradle :composeApp:testDebugUnitTest --no-daemon

      # 7. Build Debug APK
      - name: Build Debug APK
        run: gradle :composeApp:assembleDebug --no-daemon --stacktrace

      # 8. Upload APK sebagai artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: StudyMate-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7