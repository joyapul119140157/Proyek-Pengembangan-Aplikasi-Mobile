name: StudyMate CI

on:
  push:
    branches: [ "main", "project/123140043-119140157-StudyMate","sprint_2" ]
  pull_request:
    branches: [ "main", "project/123140043-119140157-StudyMate","sprint_2" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > local.properties
          # sdk.dir is usually not needed in CI as ANDROID_HOME is set, 
          # but some builds might check it in local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Build and Test
        run: |
          # Menjalankan build dan test. 
          # Jika allTests gagal/tidak ada, jalankan test standard.
          ./gradlew :composeApp:testDebugUnitTest --stacktrace || ./gradlew test --stacktrace
