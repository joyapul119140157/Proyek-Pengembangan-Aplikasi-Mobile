name: CI

on:
  push:
    branches: ["main", "development", "project/123140043-119140157-StudyMate", "sprint_2", "project/123140043-119140157-StudyMate_2"]
  pull_request:
    branches: ["main", "development", "project/123140043-119140157-StudyMate", "sprint_2", "project/123140043-119140157-StudyMate_2"]

jobs:
  build-and-test:
    name: Build & Test (Android)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Gradle (Memaksa server pakai Gradle 8.7 bersih, bypass wrapper.jar yang rusak)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 9.4.1

      # 4. Create local.properties untuk API Key Gemini
      - name: Create local.properties
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

     # 5. Grant execute permission for gradlew (Kita biarkan saja, tidak masalah)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Build APK debug (Menggunakan gradle bawaan server GitHub, bukan ./gradlew proyek)
      - name: Build Debug APK
        run: gradle :composeApp:assembleDebug -x test --no-daemon --stacktrace
